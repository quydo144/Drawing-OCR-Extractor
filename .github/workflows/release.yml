name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore "Drawing OCR Extractor.csproj"

      - name: Publish release (win-x64)
        run: >-
          dotnet publish "Drawing OCR Extractor.csproj"
          -c Release
          -r win-x64
          --self-contained true
          /p:PublishSingleFile=false
          /p:DebugType=None
          /p:DebugSymbols=false
          -o publish/win-x64

      - name: Build distributable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item publish/win-x64/* dist/ -Recurse -Force
          if (Test-Path setup_ollama_glm_ocr.bat) { Copy-Item setup_ollama_glm_ocr.bat dist/ -Force }
          if (Test-Path README.user.md) {
            Copy-Item README.user.md dist/README.md -Force
          }
          elseif (Test-Path README.md) {
            Copy-Item README.md dist/ -Force
          }
          Compress-Archive -Path dist/* -DestinationPath Drawing-OCR-Extractor-${{ github.ref_name }}.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Drawing-OCR-Extractor-${{ github.ref_name }}
          path: Drawing-OCR-Extractor-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Drawing-OCR-Extractor-${{ github.ref_name }}.zip
          generate_release_notes: true

